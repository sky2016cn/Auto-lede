name: Build_ax9000

# Add a button to trigger the workflow
on: 
  repository_dispatch:
  workflow_dispatch:

  #schedule:
    #- cron: 0 20 1,15 * *
    # 对应的是 UTC 时间，需要转换，20 代表北京时间4点，每个月1日/15日4点编译一次
    # schedule去＃号，- cron 对齐schedule的 h，开始定时编译，Actions会有十五分钟的延迟
    
jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        temp-reserve-mb: 512
        swap-size-mb: 2048
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        overprovision-lvm: 'true'
        build-mount-path: '/builder'        

    - name: Symlink workspace to maximized mount
      run: |
        sudo mkdir -p /builder
        sudo chown -R runner:runner /builder
        sudo ln -sfn /builder $GITHUB_WORKSPACE || true
        ls -ld $GITHUB_WORKSPACE

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout repository
      uses: actions/checkout@v6        

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL raw.githubusercontent.com/sky2016cn/AutoBuild-lede/master/depends-lede)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo rm -rf /etc/apt/sources.list.d/* /usr/local/lib/android /opt/ghc /usr/share/dotnet /usr/local/graalvm /usr/local/.ghcup \
        /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
        sudo timedatectl set-timezone "Asia/Shanghai"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

    - name: Check Space
      run: |
        df -h
        
    - name: Clone source code
      env: 
        REPO_URL: https://github.com/coolsnowwolf/lede
        REPO_BRANCH: master
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "src-git helloworld https://github.com/fw876/helloworld.git" >> ./feeds.conf.default
        # ======== 编译 passwall 最新版 =========
        # Lede插件库已经包含 passwall，不建议自编译 passwall最新版，与 helloword整合一起可能造成固件的不稳定，两者若要一起编入固件，建议使用 Lede官方源码，打开Lede官方插件库查询：https://github.com/coolsnowwolf/lede/blob/master/feeds.conf.default（打开luci仓库找到“applications”查询插件）   
        # 若要编译 passwall最新版，去掉下面注释，再注释掉上面的 helloworld，此命令会在 feeds.conf.default文件，第 1 行插入 passwall_luci
        sed -i '1i src-git my_passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main' feeds.conf.default

        # passwall2 和 passwall 不要一起编译，编译出来的固件会不稳定，若要使用 passwall2，先注释上面 passwall_luci，再去掉下面注释        
        #sed -i '1i src-git my_passwall2_luci https://github.com/Openwrt-Passwall/openwrt-passwall2.git;main' feeds.conf.default

        # 再次在 feeds.conf.default文件，第 1 行插入 passwall_packages (这样 packages 就变成了第 1 行，luci 变成了第 2 行)
        sed -i '1i src-git my_passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' feeds.conf.default

    - name: Update feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a

    - name: Install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds install -a

    - name: Install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds install -a

    # Lede 默认添加了 Openclash，若要编译最新版，必须feeds命令之后，去掉下面注释，会先删除源码旧版本，再重新拉取 openclash最新版，打开Lede官方插件库查询：https://github.com/coolsnowwolf/lede/blob/master/feeds.conf.default（打开luci仓库找到“applications”查询插件）      
    - name: Import external feeds - OpenClash
      working-directory: ./openwrt
      run: |
        # 先删除feeds安装命令中创建的OpenClash旧版软链接
        ./scripts/feeds uninstall luci-app-openclash
        # 再重新拉取 openclash最新版
        git clone --depth=1 https://github.com/vernesong/OpenClash.git package/OpenClash
        mv package/OpenClash/luci-app-openclash package
        rm -rf package/OpenClash

    # 范例 1: 注意拉取命令的保存路径
    #- name: Import external feeds - OpenAppFilter
    #  working-directory: ./openwrt
    #  run: |
    #    git clone https://github.com/destan19/OpenAppFilter.git package/OpenAppFilter

    - name: Configuration Customization - Build_ax9000
      env:
        CONFIG_FILE: 'ax9000.config'
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x ./customize.sh && ./customize.sh
        cd openwrt && make defconfig
        
    - name: Download package
      working-directory: ./openwrt
      run: |
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Build firmware
      working-directory: ./openwrt
      run: |
        echo -e "$(nproc) thread build."
        make -j$(nproc) V=s

    - name: Check Space
      run: |
        df -h
        
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ax9000
        path: openwrt/bin
